server:
  port: 8083
spring:
  datasource:
    url: ${AICSP_BIZ_DB_URL:jdbc:postgresql://localhost:5432/aicsp_biz?currentSchema=biz_service}
    username: ${AICSP_BIZ_DB_USERNAME:postgres}
    password: ${AICSP_BIZ_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host:
      port:
      password:
      database: 2
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: biz_service
    default-schema: biz_service
    create-schemas: true
    baseline-on-migrate: true
  cloud:
    nacos:
      discovery:
        server-addr:
        namespace: prod
rocketmq:
  name-server:
  consumer:
    group: biz-service-consumer
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

aicsp:
  worker-id: ${AICSP_WORKER_ID:2}
