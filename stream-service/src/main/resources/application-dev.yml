server:
  port: 18082
spring:
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: af127353-dea2-4140-90cd-01cfbe3ceff3
        username: nacos
        password: nacos
rocketmq:
  name-server: localhost:9876
  producer:
    group: stream-service-producer
    send-message-timeout: 3000
python:
  engine:
    base-url: http://localhost:8000
    max-connections: 200
    acquire-timeout: 3000
    connect-timeout: 5000
    response-timeout: 310000
stream:
  internal-token: dev-internal-secret
  sse:
    heartbeat-interval: 15s
    max-duration: 300s
