server:
  port: 18081
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    url: jdbc:postgresql://localhost:5432/aicsp_user?currentSchema=user_service
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,slf4j
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
        reset-enable: false
        allow: 127.0.0.1
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: '*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*'
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      database: 1
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: user_service
    default-schema: user_service
    create-schemas: true
    baseline-on-migrate: true
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: dev
        username: nacos
        password: nacos
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

aicsp:
  worker-id: 1
  admin:
    tenant-id: default
    username: admin
    password: 123456
    gender: 0
    real-name: Administrator
    age: 18
  jwt:
    secret: 4f4bbb6ee20f3e4b0f12aade1a6cbf81c8554bb2c6ab5206b7dbc03942cf5796
    ttl-seconds: 900
    refresh-ttl-seconds: 259200
    refresh-token-bytes: 32
  security:
    internal-token: 68d5ee453de54a35adfdb7f84f1ff8ef8cd10283c9e94979bdce1a8f927c7f79
  resource:
    project-root: D:/Projects/Java/ai-customer-service-platform
    sync-interval-ms: 3600000
    sync-initial-delay-ms: 60000
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin123
    bucket: aicsp-user
    public-url: http://localhost:9000
