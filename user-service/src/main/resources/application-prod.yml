server:
  port: 8081
spring:
  datasource:
    url:
    username:
    password:
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host:
      port:
      password:
      database: 1
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cloud:
    nacos:
      discovery:
        server-addr:
        namespace: prod
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
